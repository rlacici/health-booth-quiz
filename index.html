<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>미추홀구보건소 구강건강퀴즈</title>
  <!-- 기본 테마 -->
  <link rel="stylesheet" href="style.css?v=6">
  <!-- <link rel="stylesheet" href="theme-refined.css"> -->
  <link rel="stylesheet" href="theme-lively.css">
</head>
<body>
  <div class="app">
    <!-- 이미 참여 완료 -->
    <section id="screen-already" class="screen hidden">
      <div class="card already-card">
        <div class="already-content">
          <h1 class="already-title">구강건강 퀴즈</h1>
          <p class="already-message">이미 참여하셨습니다.</p>
          <p class="already-hint">1인 1회만 참여 가능합니다.</p>
        </div>
      </div>
    </section>

    <!-- 첫 화면 -->
    <section id="screen-start" class="screen">
      <div class="card start-card">
        <div class="start-header">
          <h1 class="title start-title">😊미추홀구보건소와 함께하는 구강건강퀴즈🦷</h1>
          <p class="intro start-intro">구강건강 이미지를 확인하고<br>정답을 맞춰 주세요</p>
          <p class="notice start-notice">(1인 1회 참여)</p>
        </div>

        <div class="start-bottom">
          <fieldset class="age-group">
            <legend>나이대 선택 <span class="required">*</span></legend>
            <div class="age-options">
              <label class="age-option">
                <input type="radio" name="age" value="10대 이하">
                <span>10대 이하</span>
              </label>
              <label class="age-option">
                <input type="radio" name="age" value="20대">
                <span>20대</span>
              </label>
              <label class="age-option">
                <input type="radio" name="age" value="30대">
                <span>30대</span>
              </label>
              <label class="age-option">
                <input type="radio" name="age" value="40대">
                <span>40대</span>
              </label>
              <label class="age-option">
                <input type="radio" name="age" value="50대">
                <span>50대</span>
              </label>
              <label class="age-option">
                <input type="radio" name="age" value="60대 이상">
                <span>60대 이상</span>
              </label>
            </div>
          </fieldset>
          <p id="age-error" class="error hidden">나이대를 선택해주세요.</p>

          <button type="button" id="btn-start" class="btn btn-primary">시작하기</button>
        </div>
      </div>
    </section>

    <!-- 카드뉴스 -->
    <section id="screen-card" class="screen hidden">
      <div class="card card-news-card">
        <h2 class="subtitle">카드뉴스</h2>
        <div class="card-image-wrap card-image-full">
          <img id="card-image" src="" alt="구강건강 카드뉴스">
        </div>
        <button type="button" id="btn-go-quiz" class="btn btn-primary">퀴즈 풀기</button>
      </div>
    </section>

    <!-- 퀴즈 -->
    <section id="screen-quiz" class="screen hidden">
      <div class="card quiz-card">
        <h2 class="subtitle quiz-title">퀴즈</h2>
        <p id="quiz-question" class="question"></p>

        <div id="quiz-options" class="options"></div>

        <p id="quiz-error" class="error hidden">선택지를 선택해주세요.</p>
        <p id="quiz-wrong" class="wrong hidden">아쉽습니다.<br>다시 선택해주세요.</p>

        <button type="button" id="btn-check" class="btn btn-primary">정답 확인</button>
      </div>
    </section>

    <!-- 완료 화면 -->
    <section id="screen-complete" class="screen hidden">
      <div class="card complete-card">
        <div class="complete-content">
          <p class="complete-emoji">🎉</p>
          <h1 class="complete-title">참여 완료</h1>
          <p class="complete-message">정답입니다.</p>
          <p class="complete-staff-notice">직원에게 이 화면을 보여주세요.</p>
          <div class="complete-time">
            <p class="complete-time-label">참여시간</p>
            <p id="participation-time" class="complete-time-value"></p>
          </div>
        </div>
      </div>
    </section>
  </div>

  <button type="button" id="btn-test-reset" class="btn-test-reset-fixed" title="테스트용">테스트 초기화</button>

  <script src="script.js"></script>
</body>
</html>
