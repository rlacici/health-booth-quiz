<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>미추홀구보건소 구강건강퀴즈</title>
  <link rel="stylesheet" href="style.css?v=23">
  <link rel="stylesheet" href="theme-playful.css?v=1">
</head>
<body>
  <div class="bg-decor" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
    <span class="float-emoji float-emoji-1">✨</span>
    <span class="float-emoji float-emoji-2">🦷</span>
    <span class="float-emoji float-emoji-3">💫</span>
  </div>

  <div class="app">
    <!-- 이미 참여 완료 -->
    <section id="screen-already" class="screen hidden">
      <div class="screen-inner already-screen">
        <div class="already-content">
          <p class="screen-badge">구강건강 퀴즈</p>
          <p class="already-emoji">😊</p>
          <h1 class="already-title">이미 참여하셨어요</h1>
          <p class="already-hint">1인 1회만 참여 가능해요</p>
        </div>
      </div>
    </section>

    <!-- 첫 화면 -->
    <section id="screen-start" class="screen">
      <div class="screen-inner start-screen">
        <p class="start-org">미추홀구보건소</p>
        <header class="start-header">
          <div class="start-title-frame">
            <h1 class="start-event-title">구강건강 퀴즈</h1>
          </div>
          <p class="start-guide">오늘의 카드를 보고<br>퀴즈를 맞추시면<br>선물을 드려요 🎁</p>
          <p class="start-notice">1인 1회 참여</p>
        </header>

        <div class="start-bottom">
          <h2 class="type-heading">자신의 구강관리 유형을 먼저 선택해주세요!</h2>
          <div class="type-options" role="radiogroup" aria-label="구강건강 유형 선택">
            <label class="type-card">
              <input type="radio" name="health-type" value="lazy">
              <span class="type-emoji">😴</span>
              <span class="type-label">귀찮음형</span>
            </label>
            <label class="type-card">
              <input type="radio" name="health-type" value="curious">
              <span class="type-emoji">🤔</span>
              <span class="type-label">궁금증형</span>
            </label>
            <label class="type-card">
              <input type="radio" name="health-type" value="confident">
              <span class="type-emoji">😁</span>
              <span class="type-label">자신감형</span>
            </label>
            <label class="type-card">
              <input type="radio" name="health-type" value="random">
              <span class="type-emoji">🎲</span>
              <span class="type-label">랜덤형</span>
            </label>
          </div>
          <p id="type-error" class="error hidden">유형을 선택해주세요</p>
          <button type="button" id="btn-start" class="btn btn-primary">오늘의 카드 보기 ✨</button>
        </div>
      </div>
    </section>

    <!-- 카드뉴스 -->
    <section id="screen-card" class="screen hidden">
      <div class="screen-inner card-news-screen">
        <p class="screen-badge">오늘의 카드</p>
        <div class="card-image-wrap card-image-full">
          <img id="card-image" src="" alt="구강건강 카드뉴스">
        </div>
        <button type="button" id="btn-go-quiz" class="btn btn-primary btn-card-quiz">이미지를 기억하면서 퀴즈 풀기</button>
      </div>
    </section>

    <!-- 퀴즈 -->
    <section id="screen-quiz" class="screen hidden">
      <div class="screen-inner quiz-screen">
        <p class="screen-badge">Q. 퀴즈</p>
        <p id="quiz-question" class="question"></p>
        <div id="quiz-options" class="options"></div>
        <p id="quiz-error" class="error hidden">선택지를 골라주세요</p>
        <p id="quiz-wrong" class="wrong hidden">앗, 다시 골라볼까요? 💭</p>
        <button type="button" id="btn-check" class="btn btn-primary btn-quiz-check">정답 확인</button>
      </div>
    </section>

    <!-- 완료 화면 -->
    <section id="screen-complete" class="screen hidden">
      <div class="screen-inner complete-screen">
        <div class="complete-content">
          <p class="complete-emoji">🎉</p>
          <p id="complete-answer-text" class="complete-answer-text"></p>
          <p class="complete-message">정답이에요</p>
          <h1 class="complete-title">참여 완료!</h1>
          <div class="complete-time">
            <p class="complete-staff-notice">📱 직원에게 이 화면을 보여주세요</p>
            <div class="complete-time-center">
              <p class="complete-time-label">참여시간</p>
              <p id="participation-time" class="complete-time-value"></p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <button type="button" id="btn-test-reset" class="btn-test-reset-fixed" title="테스트용">테스트 초기화</button>

  <script src="script.js?v=11"></script>
</body>
</html>
